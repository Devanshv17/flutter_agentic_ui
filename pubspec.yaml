name: flutter_agentic_ui
description: Drop-in chat UI for Flutter AI agents — chat view, streaming bubbles, ReAct step visualizer, and typing indicator, wired to flutter_agentic.
version: 0.1.1
homepage: https://github.com/Devanshv17/flutter_agentic_ui
repository: https://github.com/Devanshv17/flutter_agentic_ui
issue_tracker: https://github.com/Devanshv17/flutter_agentic_ui/issues
topics:
  - flutter
  - ai
  - chat
  - ui
  - agent

environment:
  sdk: ^3.7.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_agentic: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
